<svg width="1600" height="400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="StringUtilities banner">
  <!-- Background: Deep Dark Gray/Blue for Tech/Logic feel -->
  <rect width="1600" height="400" fill="#1B2B34"/>
  
  <!-- Decorative background elements -->
  <circle cx="200" cy="400" r="300" fill="#FFD700" fill-opacity="0.1"/>
  <circle cx="1450" cy="50" r="200" fill="#ffffff" fill-opacity="0.05"/>
  
  <!-- Text Content: Neatly Aligned, Clean White/Yellow -->
  <g transform="translate(120, 180)">
    <text font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="700" fill="#FFFFFF">StringUtilities</text>
    <text y="70" font-family="Segoe UI, Arial, sans-serif" font-size="36" fill="#FFD700">C++23 header-only string handling library</text>
  </g>
  
  <!-- Right Side Icon: Centered Vertically -->
  <g transform="translate(1300, 200)">
    <!-- Background Circle: Muted Yellow/Gray -->
    <circle r="160" fill="#24333D" stroke="#FFD700" stroke-width="4"/>
    
    <!-- Needle and Thread Icon -->
    <g id="needle-thread-icon">
        <!-- Thread -->
        <path d="M -120 40 C -80 0, -60 100, -50 50 S -20 0, 20 40 S 60 80, 100 40" fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 6"/>
        <!-- Needle -->
        <g transform="rotate(-45)">
            <path d="M -90 0 L 90 0" stroke="#E0E0E0" stroke-width="8" stroke-linecap="round"/>
            <!-- Eye of the needle -->
            <ellipse cx="-75" cy="0" rx="8" ry="3" fill="#1B2B34" stroke="#E0E0E0" stroke-width="2"/>
        </g>
    </g>
  </g>
</svg>
